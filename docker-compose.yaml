services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: "${POSTGRES_USER:-postgres}"
            POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
            POSTGRES_DB: "${POSTGRES_DB:-booking_db}"
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-postgres}" ]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        command: redis-server --appendonly yes
        ports:
            - "6379:6379"

    api:
        build: .
        env_file: .env
        environment:
            PYTHONPATH: /app/src

            POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
            POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
            POSTGRES_USER: "${POSTGRES_USER:-postgres}"
            POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
            POSTGRES_DB: "${POSTGRES_DB:-booking_db}"

            REDIS_URI: "${REDIS_URI:-redis://redis:6379/0}"
        ports:
            - "${PORT:-8000}:8000"
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started

    worker:
        build: .
        env_file: .env
        environment:
            PYTHONPATH: /app/src

            POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
            POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
            POSTGRES_USER: "${POSTGRES_USER:-postgres}"
            POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
            POSTGRES_DB: "${POSTGRES_DB:-booking_db}"

            REDIS_URI: "${REDIS_URI:-redis://redis:6379/0}"
            
            CELERY_CUSTOM_WORKER_POOL: celery_aio_pool.pool:AsyncIOPool
        command: sh -c "celery -A tasks.booking_tasks worker --loglevel=info --pool=custom"
        depends_on:
            - api

volumes:
    pgdata:
